; ESP32 IR transmitter node — one image flashed onto all 30 boards.
; Each board gets a unique hostname derived from its MAC at boot.

[env:esp32dev]
platform = espressif32@^6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Allow OTA after first USB flash. Set OTA_HOST=tvir-XXXXXX.local in env to use.
upload_protocol = esptool

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -std=gnu++17
build_unflags =
    -std=gnu++11

lib_deps =
    crankyoldgit/IRremoteESP8266@^2.8.6
    bblanchon/ArduinoJson@^7.0.4

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = ${sysenv.OTA_HOST}
upload_flags =
    --auth=${sysenv.OTA_PASSWORD}
