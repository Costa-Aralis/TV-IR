services:
  server:
    build:
      # Repo root so the Dockerfile can pull in both server/ and web/.
      context: .
      dockerfile: server/Dockerfile
    image: tv-ir-server:latest
    container_name: tv-ir
    restart: unless-stopped
    # Host networking so the container can reach the TV + DirecTV VLANs
    # directly through the LXC's interfaces. No NAT, no port-mapping headaches.
    # The server listens on every LXC IP at port 8000.
    network_mode: host
    volumes:
      - ./server/config:/app/config:ro
      - ./flipper-irdb:/app/flipper-irdb:ro
      - tv-ir-data:/app/data
    environment:
      - TVIR_CONFIG=/app/config/tvs.yaml
      - TVIR_IRDB=/app/flipper-irdb
      - TVIR_DATA=/app/data
      # Set a 4-digit staff PIN to gate the tablet UI; unset to disable.
      # - TVIR_PIN=1234
      - TZ=America/Chicago

volumes:
  tv-ir-data:
