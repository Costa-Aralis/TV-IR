# DirecTV channel reference — Prospect Heights, IL (ZIP 60070, Chicago DMA)
#
# Use this when tuning the 8 DirecTV receivers feeding the Thor RF modulator.
# After re-tuning a box, update `preset_labels` AND `preset_channels` in
# tvs.yaml so the tablet shows the right info.
#
# Channel numbers are accurate as of late 2025 for DirecTV's standard
# satellite lineup; they can change during periodic channel repacks.
# Some require Sports Pack, Premier, or other tier add-ons — flagged below.
# Verify against the receiver's on-screen guide before relying on it.

# ---------------------------------------------------------------------------
# Sports — the bread and butter of Rocky's
# ---------------------------------------------------------------------------
sports:
  national:
    - { ch: "206", name: "ESPN" }
    - { ch: "207", name: "ESPNews" }
    - { ch: "208", name: "ESPNU" }
    - { ch: "209", name: "ESPN2" }
    - { ch: "210", name: "ESPN Goal Line / Bases Loaded" }   # seasonal
    - { ch: "212", name: "NFL Network" }
    - { ch: "213", name: "MLB Network" }
    - { ch: "215", name: "NHL Network" }
    - { ch: "216", name: "NBA TV" }
    - { ch: "217", name: "Tennis Channel" }
    - { ch: "218", name: "Golf Channel" }
    - { ch: "219", name: "FS1" }
    - { ch: "220", name: "Big Ten Network", note: "BTN" }
    - { ch: "221", name: "SEC Network" }
    - { ch: "245", name: "TNT", note: "NBA / NCAA tournament" }
    - { ch: "247", name: "TBS", note: "MLB / NCAA tournament" }
    - { ch: "248", name: "truTV", note: "NCAA tournament" }
    - { ch: "611", name: "FS2" }
    - { ch: "612", name: "ACC Network" }
    - { ch: "618", name: "Big Ten Plus", tier: "Sports Pack" }
    - { ch: "623", name: "Olympic Channel" }
  premium_packages:
    - { ch: "212-1", name: "NFL RedZone", tier: "NFL Sunday Ticket" }
    - { ch: "701-718", name: "NFL Sunday Ticket games", tier: "Sunday Ticket" }
    - { ch: "719-768", name: "MLB Extra Innings", tier: "Extra Innings" }
    - { ch: "773-794", name: "NHL Center Ice", tier: "Center Ice" }
    - { ch: "795-826", name: "NBA League Pass", tier: "League Pass" }
    - { ch: "611-621", name: "Soccer / MLS Direct Kick", tier: "MLS Direct Kick" }

