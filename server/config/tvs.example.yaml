# TV inventory — copy to tvs.yaml and fill in real values.
#
# Auth tokens / client-keys / ADB keys are NOT stored here; they live in
# pairings.json (gitignored, in the data volume), populated by `python -m
# app.pair <tv_id>`.
#
# `url` format by type:
#   vizio:     https://<ip>:7345        (or :9000 on older models)
#   lg:        <ip>                     (driver picks ws/wss + port)
#   roku:      http://<ip>:8060
#   androidtv: <ip>[:5555]              (host:port for ADB)
#   firetv:    <ip>[:5555]
#   ir:        http://tvir-XXXXXX.local (ESP32 hostname or IP)

key_gap_ms: 200

preset_template:
  "1": ["3", "0", "Dot", "2", "Enter"]   # 30.2  → Box 1
  "2": ["3", "1", "Dot", "2", "Enter"]   # 31.2  → Box 2
  "3": ["3", "2", "Dot", "2", "Enter"]   # 32.2  → Box 3
  "4": ["3", "3", "Dot", "2", "Enter"]   # 33.2  → Box 4
  "5": ["3", "4", "Dot", "2", "Enter"]   # 34.2  → Box 5
  "6": ["3", "5", "Dot", "2", "Enter"]   # 35.2  → Box 6
  "7": ["3", "6", "Dot", "2", "Enter"]   # 36.2  → Box 7
  "8": ["3", "7", "Dot", "2", "Enter"]   # 37.2  → Box 8

preset_labels:
  "1": "30.2"
  "2": "31.2"
  "3": "32.2"
  "4": "33.2"
  "5": "34.2"
  "6": "35.2"
  "7": "36.2"
  "8": "37.2"

tvs:
  - id: tv01
    name: "Vizio (example)"
    slot: 1
    type: vizio
    url: "https://192.0.2.10:7345"

  - id: tv02
    name: "LG webOS (example)"
    slot: 2
    type: lg
    url: "192.0.2.11"

  - id: tv03
    name: "Roku/TCL (example)"
    slot: 3
    type: roku
    url: "http://192.0.2.12:8060"

  - id: tv04
    name: "Hisense Android TV (example)"
    slot: 4
    type: androidtv
    url: "192.0.2.13:5555"

  - id: tv05
    name: "Insignia Fire TV (example)"
    slot: 5
    type: firetv
    url: "192.0.2.14:5555"
