# TV inventory — copy to tvs.yaml and fill in.
#
# `codes` is a path under flipper-irdb/. Match brand+model to a file in
# https://github.com/Lucaslhm/Flipper-IRDB/tree/main/TVs.
#
# `preset_template` is the default channel-key sequence. The Thor RF modulator
# numbers your 8 DirecTV boxes on channels 30.2 through 37.2. Override per TV
# in `presets:` if a TV's keypad uses different button names (see `key_map`).

key_gap_ms: 200

preset_template:
  "1": ["3", "0", "Dot", "2", "Enter"]   # 30.2  → Box 1
  "2": ["3", "1", "Dot", "2", "Enter"]   # 31.2  → Box 2
  "3": ["3", "2", "Dot", "2", "Enter"]   # 32.2  → Box 3
  "4": ["3", "3", "Dot", "2", "Enter"]   # 33.2  → Box 4
  "5": ["3", "4", "Dot", "2", "Enter"]   # 34.2  → Box 5
  "6": ["3", "5", "Dot", "2", "Enter"]   # 35.2  → Box 6
  "7": ["3", "6", "Dot", "2", "Enter"]   # 36.2  → Box 7
  "8": ["3", "7", "Dot", "2", "Enter"]   # 37.2  → Box 8

tvs:
  - id: tv01
    name: "Bar Front 1"
    slot: 1
    type: ir
    url: "http://tvir-a1b2c3.local"
    codes: "TVs/Samsung/Samsung_BN59-01199F.ir"
    # Most TVs that omit "Dot" use "Sub_Channel" — alias it here.
    key_map:
      Dot: "Sub_Channel"

  - id: tv05
    name: "Patio 1"
    slot: 5
    type: roku
    url: "http://172.31.250.105:8060"
    # Roku TVs accept the same logical preset; the Roku driver translates
    # "Tv" → InputTuner, digits → Lit_*, "Enter" → Select.
    presets:
      "1": ["Tv", { delay_ms: 1500 }, "7", "Dot", "1", "Enter"]
