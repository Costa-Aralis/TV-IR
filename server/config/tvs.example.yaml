# TV inventory — copy to tvs.yaml and fill in real values.
#
# Auth tokens / client-keys / ADB keys are NOT stored here; they live in
# pairings.json (gitignored, in the data volume), populated by `python -m
# app.pair <tv_id>`.
#
# `url` format by type:
#   vizio:     https://<ip>:7345        (or :9000 on older models)
#   lg:        <ip>                     (driver picks ws/wss + port)
#   roku:      http://<ip>:8060
#   androidtv: <ip>[:5555]              (host:port for ADB)
#   firetv:    <ip>[:5555]
#   ir:        http://tvir-XXXXXX.local (ESP32 hostname or IP)

key_gap_ms: 200

preset_template:
  "1": ["3", "0", "Dot", "2", "Enter"]   # 30.2  → Box 1
  "2": ["3", "1", "Dot", "2", "Enter"]   # 31.2  → Box 2
  "3": ["3", "2", "Dot", "2", "Enter"]   # 32.2  → Box 3
  "4": ["3", "3", "Dot", "2", "Enter"]   # 33.2  → Box 4
  "5": ["3", "4", "Dot", "2", "Enter"]   # 34.2  → Box 5
  "6": ["3", "5", "Dot", "2", "Enter"]   # 35.2  → Box 6
  "7": ["3", "6", "Dot", "2", "Enter"]   # 36.2  → Box 7
  "8": ["3", "7", "Dot", "2", "Enter"]   # 37.2  → Box 8

# Box labels — what each DirecTV box is tuned to. Edit to match the bar.
# The bartender sees the label on the tablet; the digit sequence above is
# what's actually sent to switch the TV's RF channel.
preset_labels:
  "1": "ESPN"
  "2": "FS1"
  "3": "TNT"
  "4": "NBC Sports CHI"
  "5": "Marquee"
  "6": "ESPN2"
  "7": "NFL Network"
  "8": "Big Ten"

# DirecTV channel each box is currently tuned to. Shown beneath the label
# on the tablet UI so the bartender can answer "what channel is FS1?"
# without having to look it up. See directv_lineup.yaml for the full
# Chicago/60070 channel reference.
preset_channels:
  "1": "206"     # ESPN
  "2": "219"     # FS1
  "3": "245"     # TNT
  "4": "640"     # NBC Sports CHI
  "5": "648"     # Marquee
  "6": "209"     # ESPN2
  "7": "212"     # NFL Network
  "8": "220"     # Big Ten Network

# DirecTV receiver hosts (port 8080 HTTP control).
# Enable on each box: Settings → Whole-Home → External Device → Allow.
receivers:
  - { num: 1, name: "Box 1", host: "192.0.2.71", rf: "30.2" }
  - { num: 2, name: "Box 2", host: "192.0.2.72", rf: "31.2" }

# Saved multi-TV scenes.
events:
  - id: "open_default"
    name: "Open: All on, default channel"
    actions:
      - { target: "all", power: "on", preset: 1 }
  - id: "close_all"
    name: "Close: All off"
    actions:
      - { target: "all", power: "off" }

# Cron-style schedule. Standard 5 fields: "minute hour dom month dow".
# Default = Rocky's bar hours: open at 3 PM, close at 4:30 AM the next day.
# TZ is taken from the container's TZ env var (set in docker-compose.yml).
schedule:
  - { when: "0 15 * * *", action: open }
  - { when: "30 4 * * *", action: close }

tvs:
  - id: tv01
    name: "Vizio (example)"
    slot: 1
    type: vizio
    url: "https://192.0.2.10:7345"

  - id: tv02
    name: "LG webOS (example)"
    slot: 2
    type: lg
    url: "192.0.2.11"

  - id: tv03
    name: "Roku/TCL (example)"
    slot: 3
    type: roku
    url: "http://192.0.2.12:8060"

  - id: tv04
    name: "Hisense Android TV (example)"
    slot: 4
    type: androidtv
    url: "192.0.2.13:5555"

  - id: tv05
    name: "Insignia Fire TV (example)"
    slot: 5
    type: firetv
    url: "192.0.2.14:5555"
